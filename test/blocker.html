<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UFFeedBlocker test harness</title>
    <link rel="stylesheet" href="../src/content/blocker.css" />
    <style>
      body { font-family: system-ui; }
      main { border: 1px solid #ccc; padding: 8px; }
      #results { white-space: pre; font-family: monospace; }
    </style>
  </head>
  <body>
    <nav>sidebar (never touched)</nav>
    <div id="dialog" role="dialog">post modal (portal outside main)</div>
    <main>
      <div id="col">
        <div id="trayWrap">
          <ul id="tray">
            <li><a href="/stories/alice/1/">alice</a></li>
            <li><a href="/stories/bob/2/">bob</a></li>
          </ul>
        </div>
        <article id="post1">post 1 <a href="/stories/carol/3/">story link inside a post</a></article>
        <article id="post2">post 2</article>
      </div>
      <aside id="suggestions">suggested for you</aside>
    </main>
    <div id="results"></div>
    <script src="../src/shared/sites.js"></script>
    <script src="../src/content/blocker.js"></script>
    <script>
      (async () => {
        const out = [];
        let fails = 0;
        const check = (cond, name) => {
          out.push((cond ? "PASS" : "FAIL") + "  " + name);
          if (!cond) fails++;
        };
        const hidden = (el) => getComputedStyle(el).display === "none";
        const tick = () =>
          new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

        const blocker = new UFFeedBlocker();
        blocker.keepStoriesTray = true; // as index.js sets for sites with storiesTray (Instagram)
        blocker.message = "With focus, anything is possible.";
        blocker.activate();
        await tick();

        const dialog = document.getElementById("dialog");
        check(document.documentElement.hasAttribute("data-uf-feed-hidden"), "tray found: selective mode");
        check(!hidden(dialog), "feed block keeps dialogs usable");
        check(!hidden(document.getElementById("tray")), "stories tray stays visible");
        check(hidden(document.getElementById("post1")), "post containing a story link is hidden");
        check(hidden(document.getElementById("post2")), "feed post is hidden");
        check(hidden(document.getElementById("suggestions")), "suggestions sidebar is hidden");
        check(blocker.overlay.textContent.includes("With focus"), "overlay shows the message");

        // React-style re-render: a new post appears → observer hides it
        const post3 = document.createElement("article");
        post3.id = "post3";
        post3.textContent = "post 3";
        document.getElementById("col").appendChild(post3);
        await tick();
        await tick();
        check(hidden(post3), "newly rendered post gets hidden");

        blocker.deactivate();
        check(!hidden(document.getElementById("post1")), "deactivate restores posts");
        check(!hidden(document.getElementById("suggestions")), "deactivate restores sidebar");
        check(
          !document.documentElement.hasAttribute("data-uf-feed-hidden") &&
            !document.documentElement.hasAttribute("data-uf-main-hidden"),
          "deactivate clears attributes"
        );

        // Item drift wall: dialogs (post/reel viewers outside <main>) are
        // hidden too
        blocker.hideDialogs = true;
        blocker.activate();
        await tick();
        check(hidden(dialog), "drift wall hides dialogs");
        blocker.deactivate();
        check(!hidden(dialog), "deactivate restores dialogs");
        blocker.hideDialogs = false;

        // LinkedIn-like site (no storiesTray in its rule): tray detection is
        // skipped and <main> hides even though tray-shaped markup exists.
        blocker.keepStoriesTray = false;
        blocker.activate();
        await tick();
        check(
          document.documentElement.hasAttribute("data-uf-main-hidden"),
          "keepStoriesTray=false: whole-main mode despite tray markup"
        );
        check(hidden(document.querySelector("main")), "keepStoriesTray=false hides main");
        blocker.deactivate();
        blocker.keepStoriesTray = true;

        // Explore/Reels-like surface: no tray → whole <main> hidden. The
        // story link inside the remaining post must NOT count as a tray.
        document.getElementById("trayWrap").remove();
        blocker.activate();
        await tick();
        check(document.documentElement.hasAttribute("data-uf-main-hidden"), "no tray: whole-main mode");
        check(hidden(document.querySelector("main")), "main fully hidden without a tray");
        blocker.deactivate();
        check(!hidden(document.querySelector("main")), "deactivate restores main");

        // LinkedIn-like surface, driven by the REAL linkedin rule's findFeed:
        // only the infinite-scroll feed column hides — profile card, news
        // rail, and composer stay. (Replaces the fixture; keep this last.)
        const li = globalThis.UFSiteRules.forHost("www.linkedin.com");
        document.querySelector("main").innerHTML = `
          <div id="liRow">
            <div id="liProfile">profile card</div>
            <div id="liCol">
              <div id="liComposer">start a post</div>
              <div id="liFeed">
                <div data-id="urn:li:activity:71">post 1
                  <div data-urn="urn:li:ugcPost:72">nested reshare</div>
                </div>
                <div data-id="urn:li:activity:73">post 2</div>
              </div>
            </div>
            <div id="liNews">news rail</div>
          </div>`;
        blocker.keepStoriesTray = false;
        blocker.findFeed = li.findFeed;
        blocker.activate();
        await tick();
        check(document.documentElement.hasAttribute("data-uf-feed-hidden"), "linkedin: selective feed mode");
        // The branch KEEPS its layout box (data-uf-hide-children); only its
        // children hide — so sibling columns never reflow and the overlay
        // can center on the branch's rect.
        check(!hidden(document.getElementById("liFeed")), "linkedin feed branch keeps its box");
        check(hidden(document.querySelector("#liFeed > [data-id]")), "linkedin feed cards hidden");
        check(!hidden(document.getElementById("liProfile")), "profile card stays visible");
        check(!hidden(document.getElementById("liNews")), "news rail stays visible");
        check(!hidden(document.getElementById("liComposer")), "composer stays visible");
        // a post streamed in later never paints: the CSS child rule catches
        // it instantly, no observer round-trip needed
        const liPost3 = document.createElement("div");
        liPost3.setAttribute("data-id", "urn:li:activity:74");
        liPost3.textContent = "post 3";
        document.getElementById("liFeed").appendChild(liPost3);
        check(liPost3.getClientRects().length === 0, "new linkedin post never paints");
        blocker.deactivate();
        check(!hidden(document.querySelector("#liFeed > [data-id]")), "deactivate restores the feed cards");
        // single card = too weak a signal: fall back to whole-main
        document.getElementById("liFeed").innerHTML = '<div data-id="urn:li:activity:71">only post</div>';
        blocker.activate();
        await tick();
        check(document.documentElement.hasAttribute("data-uf-main-hidden"), "under 2 cards: whole-main fallback");
        blocker.deactivate();

        // New-UI LinkedIn DOM: hashed class names, aria-labelled columns,
        // card urns buried MID-VALUE in tracking attributes. The cards' list
        // hides; composer, sidebar, and news rail stay.
        document.querySelector("main").innerHTML = `
          <div class="_1aa780e9 _34250a86" style="display:flex; gap:16px">
            <aside aria-label="Sidebar" id="nSidebar" style="width:180px">profile card</aside>
            <section aria-label="Primary content" id="nPrimary" style="flex:1">
              <div id="nComposer">start a post</div>
              <div id="nList">
                <div componentkey='{"u":"urn:li:activity:91"}'>post 1</div>
                <div componentkey='{"u":"urn:li:activity:92"}'>post 2</div>
              </div>
            </section>
            <aside aria-label="Aside" id="nNews" style="width:260px">news rail</aside>
          </div>`;
        blocker.activate();
        await tick();
        check(document.documentElement.hasAttribute("data-uf-feed-hidden"), "new DOM: selective feed mode");
        check(!hidden(document.getElementById("nList")), "new DOM: list keeps its box");
        check(hidden(document.querySelector("#nList > div")), "new DOM: cards hidden");
        check(!hidden(document.getElementById("nComposer")), "new DOM: composer stays");
        check(!hidden(document.getElementById("nSidebar")), "new DOM: sidebar stays");
        check(!hidden(document.getElementById("nNews")), "new DOM: news rail stays");
        // overlay narrows to the feed branch's box, not the whole viewport
        const listRect = document.getElementById("nList").getBoundingClientRect();
        check(
          Math.abs(parseFloat(blocker.overlay.style.left) - listRect.left) < 2 &&
            Math.abs(window.innerWidth - parseFloat(blocker.overlay.style.right) - listRect.right) < 2,
          "new DOM: message centered over the feed column"
        );
        blocker.deactivate();

        // Same columns but no urn exposed anywhere: the aria landmark alone
        // carries it — the whole primary column hides, asides still stay,
        // and the message centers in the gap BETWEEN the asides.
        document.getElementById("nList").innerHTML =
          "<div>post 1</div><div>post 2</div>";
        blocker.activate();
        await tick();
        check(document.documentElement.hasAttribute("data-uf-feed-hidden"), "landmark only: selective mode");
        check(!hidden(document.getElementById("nPrimary")), "landmark only: column keeps its layout box");
        check(hidden(document.getElementById("nComposer")) && hidden(document.getElementById("nList")),
              "landmark only: column contents hidden");
        check(!hidden(document.getElementById("nSidebar")), "landmark only: sidebar stays");
        check(!hidden(document.getElementById("nNews")), "landmark only: news rail stays");
        // the column keeps its width, so the asides don't reflow and the
        // message sits exactly in the gap between them
        const sbRect = document.getElementById("nSidebar").getBoundingClientRect();
        const nwRect = document.getElementById("nNews").getBoundingClientRect();
        check(
          parseFloat(blocker.overlay.style.left) >= sbRect.right - 1 &&
            window.innerWidth - parseFloat(blocker.overlay.style.right) <= nwRect.left + 1,
          "landmark only: message sits between the asides"
        );
        blocker.deactivate();

        const summary = fails === 0 ? "ALL PASS (" + out.length + " checks)" : fails + " FAILURES";
        out.push(summary);
        document.getElementById("results").textContent = out.join("\n");
        console.log("UF_TEST_RESULT: " + summary);
      })();
    </script>
  </body>
</html>
